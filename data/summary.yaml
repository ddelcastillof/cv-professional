text: "Epidemiologist and physician with an MPH in Epidemiology and extensive
  experience translating real-world evidence from claims, electronic health
  records, linked administrative data, cohorts, and observational studies across
  the UK, US, and Peru into meaningful insights. Strong background in causal
  inference, survival analysis, evidence synthesis, and communicating findings
  to both specialist and lay audiences. Adept at integrating state-of-the-art
  tools, such as large language models, into analytical workflows to support
  coding and research. Particularly interested in applying this skill set to
  advance non-communicable disease drug development in global, industry
  environments."
